query($ident: ID!) {
    hentPerson(ident: $ident) {
        adressebeskyttelse(historikk: false) {
            gradering
        }
        navn(historikk: false) {
            fornavn
            mellomnavn
            etternavn
        }
        adresser{
            bostedsadresse(historikk: false){
                vegadresse{
                    adressenavn
                    husnummer
                    husbokstav
                    bruksenhetsnummer
                    postnummer
                }
            }
        }
        telefonnummer{
            landskode
            nummer
            prioritet
        }
    }
}
